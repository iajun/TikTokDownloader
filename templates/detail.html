<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频详情 - 抖音视频AI总结工具</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .main-content {
            padding: 40px;
        }
        
        .nav-links {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .nav-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            margin: 0 15px;
            padding: 10px 20px;
            border-radius: 25px;
            transition: background 0.3s;
        }
        
        .nav-link:hover {
            background: #f8f9fa;
        }
        
        .nav-link.active {
            background: #667eea;
            color: white;
        }
        
        .detail-section {
            margin-bottom: 30px;
        }
        
        .detail-header {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .detail-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        
        .detail-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin-right: 12px;
            border-radius: 2px;
        }
        
        .detail-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .meta-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .meta-label {
            font-size: 12px;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        
        .meta-value {
            font-size: 14px;
            color: #333;
            word-break: break-all;
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .status-processing {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .status-completed {
            background: #e8f5e8;
            color: #388e3c;
        }
        
        .status-failed {
            background: #ffebee;
            color: #d32f2f;
        }
        
        .content-card {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        
        .content-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        
        .content-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin-right: 10px;
            border-radius: 2px;
        }
        
        .content-text {
            line-height: 1.6;
            color: #555;
        }
        
        /* 富文本样式 */
        .rich-text-content {
            line-height: 1.6;
            color: #555;
        }
        
        .rich-text-content h1,
        .rich-text-content h2,
        .rich-text-content h3,
        .rich-text-content h4,
        .rich-text-content h5,
        .rich-text-content h6 {
            color: #333;
            margin: 20px 0 10px 0;
            font-weight: 600;
        }
        
        .rich-text-content h1 {
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 5px;
        }
        
        .rich-text-content h2 {
            font-size: 1.3em;
            border-bottom: 1px solid #e9ecef;
            padding-bottom: 3px;
        }
        
        .rich-text-content h3 {
            font-size: 1.2em;
        }
        
        .rich-text-content ul,
        .rich-text-content ol {
            margin: 10px 0;
            padding-left: 20px;
        }
        
        .rich-text-content li {
            margin: 5px 0;
        }
        
        .rich-text-content p {
            margin: 10px 0;
        }
        
        .rich-text-content strong {
            color: #333;
            font-weight: 600;
        }
        
        .rich-text-content em {
            color: #666;
            font-style: italic;
        }
        
        .rich-text-content code {
            background: #f8f9fa;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: #e74c3c;
        }
        
        .rich-text-content pre {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 15px 0;
            border-left: 4px solid #667eea;
        }
        
        .rich-text-content pre code {
            background: none;
            padding: 0;
            color: #333;
        }
        
        .rich-text-content blockquote {
            border-left: 4px solid #667eea;
            margin: 15px 0;
            padding: 10px 15px;
            background: #f8f9fa;
            border-radius: 0 8px 8px 0;
        }
        
        .rich-text-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        
        .rich-text-content th,
        .rich-text-content td {
            border: 1px solid #e9ecef;
            padding: 8px 12px;
            text-align: left;
        }
        
        .rich-text-content th {
            background: #f8f9fa;
            font-weight: 600;
        }
        
        .rich-text-content hr {
            border: none;
            height: 1px;
            background: #e9ecef;
            margin: 20px 0;
        }
        
        .video-player {
            width: 100%;
            max-width: 600px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .audio-player {
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
        }
        
        .file-links {
            margin-top: 15px;
        }
        
        .file-link {
            display: inline-block;
            background: #f8f9fa;
            color: #667eea;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 20px;
            margin-right: 10px;
            margin-bottom: 10px;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        .file-link:hover {
            background: #e9ecef;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        .empty-state h3 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .back-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-bottom: 20px;
        }
        
        .back-btn:hover {
            transform: translateY(-2px);
        }
        
        .resummarize-btn {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(40, 167, 69, 0.3);
        }
        
        .resummarize-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.4);
        }
        
        .resummarize-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 2px 8px rgba(40, 167, 69, 0.2);
        }
        
        .resummarize-btn.loading {
            background: linear-gradient(135deg, #6c757d, #495057);
        }
        
        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .main-content {
                padding: 20px;
            }
            
            .detail-meta {
                grid-template-columns: 1fr;
            }
            
            .content-card {
                padding: 20px;
            }
            
            .video-player {
                max-width: 100%;
            }
            
            .audio-player {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📄 视频详情</h1>
            <p>查看完整的视频处理结果</p>
        </div>
        
        <div class="main-content">
            <div class="nav-links">
                <a href="/" class="nav-link">🏠 返回首页</a>
                <a href="/history" class="nav-link">📚 历史记录</a>
                <a href="/docs" class="nav-link">📖 API文档</a>
            </div>
            
            <button class="back-btn" onclick="history.back()">← 返回</button>
            
            <div class="detail-section" id="detailSection">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <div>正在加载详情...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadDetail() {
            try {
                const recordId = decodeURIComponent(window.location.pathname.split('/').pop());
                const response = await fetch(`/api/record/${encodeURIComponent(recordId)}`);
                const result = await response.json();
                
                if (result.success) {
                    displayDetail(result.record);
                } else {
                    showError('加载详情失败');
                }
            } catch (error) {
                console.error('Error loading detail:', error);
                showError('网络错误，请重试');
            }
        }
        
        function displayDetail(record) {
            const detailSection = document.getElementById('detailSection');
            
            let html = `
                <div class="detail-header">
                    <div class="detail-title">视频处理详情</div>
                    <div class="detail-meta">
                        <div class="meta-item">
                            <div class="meta-label">状态</div>
                            <div class="meta-value">
                                <span class="status-badge status-${record.status}">
                                    ${getStatusText(record.status)}
                                </span>
                            </div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">创建时间</div>
                            <div class="meta-value">${formatDate(record.created_at)}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">来源</div>
                            <div class="meta-value">${getSourceText(record.source)}</div>
                        </div>
                        <div class="meta-item">
                            <div class="meta-label">记录ID</div>
                            <div class="meta-value">${record.id}</div>
                        </div>
                        ${record.video_name ? `
                        <div class="meta-item">
                            <div class="meta-label">文件名</div>
                            <div class="meta-value" style="word-break: break-all; font-size: 12px;">${record.video_name}</div>
                        </div>
                        ` : ''}
                    </div>
                    <div class="meta-item">
                        <div class="meta-label">原始链接</div>
                        <div class="meta-value">
                            <a href="${record.url}" target="_blank" style="color: #667eea; text-decoration: none;">
                                ${record.url}
                            </a>
                        </div>
                    </div>
                </div>
            `;
            
            if (record.status === 'processing') {
                html += `
                    <div class="content-card">
                        <div class="content-title">⏳ 处理状态</div>
                        <div class="content-text">正在处理视频，请稍候...</div>
                    </div>
                `;
            } else if (record.status === 'failed') {
                html += `
                    <div class="content-card">
                        <div class="content-title">❌ 处理失败</div>
                        <div class="content-text">视频处理失败，请检查链接是否正确</div>
                    </div>
                `;
            } else {
                // 视频播放器
                if (record.video_path) {
                    const fileName = record.video_path.split('/').pop();
                    let videoUrl;
                    if (record.source === 'volume') {
                        videoUrl = `/download/${record.video_path}`;
                    } else {
                        videoUrl = `/downloads/Download/${fileName}`;
                    }
                    html += `
                        <div class="content-card">
                            <div class="content-title">🎥 视频 ${record.source === 'volume' ? '(Volume)' : ''}</div>
                            <video controls class="video-player">
                                <source src="${videoUrl}" type="video/mp4">
                                您的浏览器不支持视频播放。
                            </video>
                        </div>
                    `;
                }
                
                // 音频播放器
                if (record.audio_path) {
                    const fileName = record.audio_path.split('/').pop();
                    let audioUrl;
                    if (record.source === 'volume') {
                        audioUrl = `/download/${record.audio_path}`;
                    } else {
                        audioUrl = `/downloads/Download/${fileName}`;
                    }
                    html += `
                        <div class="content-card">
                            <div class="content-title">🎵 音频 ${record.source === 'volume' ? '(Volume)' : ''}</div>
                            <audio controls class="audio-player">
                                <source src="${audioUrl}" type="audio/wav">
                                您的浏览器不支持音频播放。
                            </audio>
                        </div>
                    `;
                }
                
                // AI总结
                if (record.summary) {
                    html += `
                        <div class="content-card">
                            <div class="content-title">🤖 AI总结</div>
                            <div class="rich-text-content">${renderMarkdown(record.summary)}</div>
                            <div style="margin-top: 15px;">
                                <button class="resummarize-btn" onclick="resummarizeVideo('${record.id}')">
                                    🔄 重新总结
                                </button>
                            </div>
                        </div>
                    `;
                } else if (record.audio_path) {
                    // 如果有音频但没有总结，显示重新总结按钮
                    html += `
                        <div class="content-card">
                            <div class="content-title">🤖 AI总结</div>
                            <div class="content-text" style="color: #666; font-style: italic;">暂无AI总结</div>
                            <div style="margin-top: 15px;">
                                <button class="resummarize-btn" onclick="resummarizeVideo('${record.id}')">
                                    🤖 生成AI总结
                                </button>
                            </div>
                        </div>
                    `;
                }
                            
                // 转录文本
                if (record.transcription) {
                    html += `
                        <div class="content-card">
                            <div class="content-title">📝 语音转文字</div>
                            <div class="content-text">${record.transcription}</div>
                        </div>
                    `;
                }

                // 文件下载
                html += `
                    <div class="content-card">
                        <div class="content-title">📁 文件下载</div>
                        <div class="file-links">
                `;
                
                if (record.video_path) {
                    const fileName = record.video_path.split('/').pop();
                    let videoUrl;
                    if (record.source === 'volume') {
                        videoUrl = `/download/${record.video_path}`;
                    } else {
                        videoUrl = `/downloads/Download/${fileName}`;
                    }
                    html += `<a href="${videoUrl}" class="file-link" download>📹 下载视频</a>`;
                }
                
                if (record.audio_path) {
                    const fileName = record.audio_path.split('/').pop();
                    let audioUrl;
                    if (record.source === 'volume') {
                        audioUrl = `/download/${record.audio_path}`;
                    } else {
                        audioUrl = `/downloads/Download/${fileName}`;
                    }
                    html += `<a href="${audioUrl}" class="file-link" download>🎵 下载音频</a>`;
                }
                
                if (record.transcription_file) {
                    const fileName = record.transcription_file.split('/').pop();
                    let transcriptionUrl;
                    if (record.source === 'volume') {
                        transcriptionUrl = `/download/${record.transcription_file}`;
                    } else {
                        transcriptionUrl = `/downloads/Download/${fileName}`;
                    }
                    html += `<a href="${transcriptionUrl}" class="file-link" download>📄 下载转录文本</a>`;
                }
                
                if (record.summary_file) {
                    const fileName = record.summary_file.split('/').pop();
                    let summaryUrl;
                    if (record.source === 'volume') {
                        summaryUrl = `/download/${record.summary_file}`;
                    } else {
                        summaryUrl = `/downloads/Download/${fileName}`;
                    }
                    html += `<a href="${summaryUrl}" class="file-link" download>📋 下载总结</a>`;
                }
                
                html += `
                        </div>
                    </div>
                `;
            }
            
            detailSection.innerHTML = html;
        }
        
        function getStatusText(status) {
            const statusMap = {
                'processing': '处理中',
                'completed': '已完成',
                'failed': '失败'
            };
            return statusMap[status] || status;
        }
        
        function getSourceText(source) {
            const sourceMap = {
                'database': '数据库',
                'volume': 'Volume目录'
            };
            return sourceMap[source] || '未知';
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN');
        }
        
        function showError(message) {
            const detailSection = document.getElementById('detailSection');
            detailSection.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">❌</div>
                    <h3>加载失败</h3>
                    <p>${message}</p>
                </div>
            `;
        }
        
        // Markdown渲染函数
        function renderMarkdown(text) {
            if (!text) return '';
            
            // 配置marked选项
            marked.setOptions({
                breaks: true,  // 支持换行
                gfm: true,     // 支持GitHub风格的Markdown
                sanitize: false, // 允许HTML标签
                smartLists: true,
                smartypants: true
            });
            
            try {
                return marked.parse(text);
            } catch (error) {
                console.error('Markdown渲染错误:', error);
                // 如果Markdown渲染失败，回退到简单的换行处理
                return text.replace(/\n/g, '<br>');
            }
        }
        
        // 重新总结功能
        async function resummarizeVideo(recordId) {
            const button = event.target;
            const originalText = button.textContent;
            
            try {
                // 禁用按钮并显示加载状态
                button.disabled = true;
                button.classList.add('loading');
                button.innerHTML = '<div class="loading-spinner"></div>处理中...';
                
                // 发送重新总结请求
                const response = await fetch(`/api/resummarize/${encodeURIComponent(recordId)}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // 显示成功消息
                    showNotification('重新总结任务已开始，请稍候...', 'success');
                    
                    // 开始监控任务状态
                    monitorResummarizeTask(result.task_id, recordId);
                } else {
                    showNotification(result.message || '重新总结失败', 'error');
                    resetResummarizeButton(button, originalText);
                }
                
            } catch (error) {
                console.error('重新总结失败:', error);
                showNotification('网络错误，请重试', 'error');
                resetResummarizeButton(button, originalText);
            }
        }
        
        function resetResummarizeButton(button, originalText) {
            button.disabled = false;
            button.classList.remove('loading');
            button.textContent = originalText;
        }
        
        async function monitorResummarizeTask(taskId, recordId) {
            const checkInterval = setInterval(async () => {
                try {
                    const response = await fetch(`/api/task/${taskId}`);
                    const result = await response.json();
                    
                    if (result.success) {
                        const task = result.task;
                        
                        if (task.status === 'completed') {
                            clearInterval(checkInterval);
                            showNotification('重新总结完成！', 'success');
                            // 重新加载详情页面
                            await loadDetail();
                        } else if (task.status === 'failed') {
                            clearInterval(checkInterval);
                            showNotification(`重新总结失败: ${task.error || '未知错误'}`, 'error');
                        } else if (task.status === 'cancelled') {
                            clearInterval(checkInterval);
                            showNotification('重新总结任务已取消', 'warning');
                        }
                    }
                } catch (error) {
                    console.error('监控任务状态失败:', error);
                }
            }, 2000);
            
            // 30秒后停止监控
            setTimeout(() => {
                clearInterval(checkInterval);
            }, 30000);
        }
        
        function showNotification(message, type = 'info') {
            // 创建通知元素
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.textContent = message;
            
            // 添加样式
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 20px;
                border-radius: 8px;
                color: white;
                font-weight: 600;
                z-index: 1000;
                animation: slideIn 0.3s ease-out;
                max-width: 300px;
                word-wrap: break-word;
            `;
            
            // 根据类型设置背景色
            const colors = {
                success: '#28a745',
                error: '#dc3545',
                warning: '#ffc107',
                info: '#17a2b8'
            };
            notification.style.backgroundColor = colors[type] || colors.info;
            
            // 添加到页面
            document.body.appendChild(notification);
            
            // 3秒后自动移除
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-in';
                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.parentNode.removeChild(notification);
                    }
                }, 300);
            }, 3000);
        }
        
        // 添加动画样式
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            
            @keyframes slideOut {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(100%);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
        
        // 页面加载时获取详情
        window.addEventListener('load', loadDetail);
    </script>
</body>
</html>
