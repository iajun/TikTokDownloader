<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史记录 - 抖音视频AI总结工具</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .main-content {
            padding: 40px;
        }
        
        .nav-links {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .nav-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            margin: 0 15px;
            padding: 10px 20px;
            border-radius: 25px;
            transition: background 0.3s;
        }
        
        .nav-link:hover {
            background: #f8f9fa;
        }
        
        .nav-link.active {
            background: #667eea;
            color: white;
        }
        
        .filters-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .filters-row {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
            min-width: 150px;
        }
        
        .filter-group label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        
        .filter-group select,
        .filter-group input {
            padding: 8px 12px;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            font-size: 14px;
            background: white;
        }
        
        .filter-group select:focus,
        .filter-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .search-box {
            flex: 1;
            min-width: 200px;
        }
        
        .records-section {
            margin-top: 30px;
        }
        
        .records-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .record-card {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        
        .record-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .record-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        
        .record-card.status-processing::before {
            background: linear-gradient(135deg, #2196f3, #1976d2);
        }
        
        .record-card.status-completed::before {
            background: linear-gradient(135deg, #4caf50, #388e3c);
        }
        
        .record-card.status-failed::before {
            background: linear-gradient(135deg, #f44336, #d32f2f);
        }
        
        .record-header {
            margin-bottom: 15px;
        }
        
        .record-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .record-url {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            word-break: break-all;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .record-url:hover {
            text-decoration: underline;
        }
        
        .record-status {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .status-processing {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .status-completed {
            background: #e8f5e8;
            color: #388e3c;
        }
        
        .status-failed {
            background: #ffebee;
            color: #d32f2f;
        }
        
        .record-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 12px;
            color: #666;
        }
        
        .record-date {
            display: flex;
            align-items: center;
        }
        
        .record-date::before {
            content: '📅';
            margin-right: 5px;
        }
        
        .record-source {
            background: #f8f9fa;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            color: #666;
        }
        
        .record-preview {
            margin-top: 15px;
        }
        
        .preview-section {
            margin-bottom: 10px;
        }
        
        .preview-title {
            font-size: 12px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
        }
        
        .preview-title::before {
            content: '';
            width: 3px;
            height: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin-right: 6px;
            border-radius: 2px;
        }
        
        .preview-text {
            font-size: 13px;
            color: #555;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .preview-summary {
            font-size: 13px;
            color: #555;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .card-footer {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .view-details-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .view-details-btn:hover {
            transform: translateY(-1px);
        }
        
        .file-count {
            font-size: 11px;
            color: #666;
            background: #f8f9fa;
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        .record-content {
            margin-top: 15px;
        }
        
        .content-section {
            margin-bottom: 15px;
        }
        
        .content-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        
        .content-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin-right: 8px;
            border-radius: 2px;
        }
        
        .content-text {
            color: #555;
            line-height: 1.6;
            max-height: 100px;
            overflow: hidden;
            position: relative;
        }
        
        .content-text.expanded {
            max-height: none;
        }
        
        /* 富文本样式 */
        .rich-text-content {
            line-height: 1.6;
            color: #555;
        }
        
        .rich-text-content h1,
        .rich-text-content h2,
        .rich-text-content h3,
        .rich-text-content h4,
        .rich-text-content h5,
        .rich-text-content h6 {
            color: #333;
            margin: 20px 0 10px 0;
            font-weight: 600;
        }
        
        .rich-text-content h1 {
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 5px;
        }
        
        .rich-text-content h2 {
            font-size: 1.3em;
            border-bottom: 1px solid #e9ecef;
            padding-bottom: 3px;
        }
        
        .rich-text-content h3 {
            font-size: 1.2em;
        }
        
        .rich-text-content ul,
        .rich-text-content ol {
            margin: 10px 0;
            padding-left: 20px;
        }
        
        .rich-text-content li {
            margin: 5px 0;
        }
        
        .rich-text-content p {
            margin: 10px 0;
        }
        
        .rich-text-content strong {
            color: #333;
            font-weight: 600;
        }
        
        .rich-text-content em {
            color: #666;
            font-style: italic;
        }
        
        .rich-text-content code {
            background: #f8f9fa;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: #e74c3c;
        }
        
        .rich-text-content pre {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 15px 0;
            border-left: 4px solid #667eea;
        }
        
        .rich-text-content pre code {
            background: none;
            padding: 0;
            color: #333;
        }
        
        .rich-text-content blockquote {
            border-left: 4px solid #667eea;
            margin: 15px 0;
            padding: 10px 15px;
            background: #f8f9fa;
            border-radius: 0 8px 8px 0;
        }
        
        .rich-text-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        
        .rich-text-content th,
        .rich-text-content td {
            border: 1px solid #e9ecef;
            padding: 8px 12px;
            text-align: left;
        }
        
        .rich-text-content th {
            background: #f8f9fa;
            font-weight: 600;
        }
        
        .rich-text-content hr {
            border: none;
            height: 1px;
            background: #e9ecef;
            margin: 20px 0;
        }
        
        .expand-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .expand-btn:hover {
            text-decoration: underline;
        }
        
        .file-links {
            margin-top: 15px;
        }
        
        .file-link {
            display: inline-block;
            background: #f8f9fa;
            color: #667eea;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 15px;
            margin-right: 8px;
            margin-bottom: 8px;
            font-size: 12px;
            transition: background 0.3s;
        }
        
        .file-link:hover {
            background: #e9ecef;
        }
        
        .video-player {
            width: 100%;
            max-width: 300px;
            border-radius: 8px;
            margin-top: 10px;
        }
        
        .audio-player {
            width: 100%;
            max-width: 250px;
            margin-top: 10px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        .empty-state h3 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .main-content {
                padding: 20px;
            }
            
            .filters-section {
                padding: 15px;
            }
            
            .filters-row {
                flex-direction: column;
                gap: 10px;
            }
            
            .filter-group {
                min-width: auto;
                width: 100%;
            }
            
            .records-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            
            .record-card {
                padding: 15px;
            }
            
            .record-title {
                font-size: 15px;
            }
            
            .record-status {
                position: static;
                margin-top: 10px;
                align-self: flex-start;
            }
            
            .record-meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            
            .card-footer {
                flex-direction: column;
                gap: 10px;
                align-items: stretch;
            }
            
            .view-details-btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 历史记录</h1>
            <p>查看所有已处理的抖音视频</p>
        </div>
        
        <div class="main-content">
            <div class="nav-links">
                <a href="/" class="nav-link">🏠 返回首页</a>
                <a href="/history" class="nav-link active">📚 历史记录</a>
                <a href="/docs" class="nav-link">📖 API文档</a>
            </div>
            
            <div class="filters-section">
                <div class="filters-row">
                    <div class="filter-group search-box">
                        <label for="searchInput">🔍 搜索</label>
                        <input type="text" id="searchInput" placeholder="搜索URL、转录内容或总结...">
                    </div>
                    <div class="filter-group">
                        <label for="statusFilter">📊 状态</label>
                        <select id="statusFilter">
                            <option value="">全部状态</option>
                            <option value="completed">已完成</option>
                            <option value="processing">处理中</option>
                            <option value="failed">失败</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="sourceFilter">📁 来源</label>
                        <select id="sourceFilter">
                            <option value="">全部来源</option>
                            <option value="database">数据库</option>
                            <option value="volume">Volume目录</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="sortBy">🔄 排序</label>
                        <select id="sortBy">
                            <option value="date_desc">最新优先</option>
                            <option value="date_asc">最旧优先</option>
                            <option value="status">按状态</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="records-section" id="recordsSection">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <div>正在加载历史记录...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allRecords = [];
        let filteredRecords = [];
        
        async function loadRecords() {
            try {
                const response = await fetch('/api/records');
                const result = await response.json();
                
                if (result.success) {
                    allRecords = result.records;
                    filteredRecords = [...allRecords];
                    displayRecords(filteredRecords);
                    setupFilters();
                } else {
                    showError('加载记录失败');
                }
            } catch (error) {
                console.error('Error loading records:', error);
                showError('网络错误，请重试');
            }
        }
        
        function setupFilters() {
            const searchInput = document.getElementById('searchInput');
            const statusFilter = document.getElementById('statusFilter');
            const sourceFilter = document.getElementById('sourceFilter');
            const sortBy = document.getElementById('sortBy');
            
            searchInput.addEventListener('input', applyFilters);
            statusFilter.addEventListener('change', applyFilters);
            sourceFilter.addEventListener('change', applyFilters);
            sortBy.addEventListener('change', applyFilters);
        }
        
        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;
            const sourceFilter = document.getElementById('sourceFilter').value;
            const sortBy = document.getElementById('sortBy').value;
            
            filteredRecords = allRecords.filter(record => {
                // 搜索过滤
                const matchesSearch = !searchTerm || 
                    record.url.toLowerCase().includes(searchTerm) ||
                    (record.transcription && record.transcription.toLowerCase().includes(searchTerm)) ||
                    (record.summary && record.summary.toLowerCase().includes(searchTerm));
                
                // 状态过滤
                const matchesStatus = !statusFilter || record.status === statusFilter;
                
                // 来源过滤
                const matchesSource = !sourceFilter || record.source === sourceFilter;
                
                return matchesSearch && matchesStatus && matchesSource;
            });
            
            // 排序
            filteredRecords.sort((a, b) => {
                switch (sortBy) {
                    case 'date_desc':
                        return new Date(b.created_at) - new Date(a.created_at);
                    case 'date_asc':
                        return new Date(a.created_at) - new Date(b.created_at);
                    case 'status':
                        const statusOrder = { 'processing': 0, 'completed': 1, 'failed': 2 };
                        return statusOrder[a.status] - statusOrder[b.status];
                    default:
                        return 0;
                }
            });
            
            displayRecords(filteredRecords);
        }
        
        function displayRecords(records) {
            const recordsSection = document.getElementById('recordsSection');
            
            if (records.length === 0) {
                recordsSection.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <h3>暂无匹配记录</h3>
                        <p>没有找到符合条件的记录，<a href="/" style="color: #667eea;">去处理第一个视频</a></p>
                    </div>
                `;
                return;
            }
            
            let html = '<div class="records-grid">';
            
            records.forEach(record => {
                html += `
                    <div class="record-card status-${record.status}" onclick="viewDetails('${record.id}')">
                        <div class="record-header">
                            <div class="record-title">${getRecordTitle(record)}</div>
                            <span class="record-status status-${record.status}">
                                ${getStatusText(record.status)}
                            </span>
                        </div>
                        
                        <div class="record-meta">
                            <div class="record-date">${formatDate(record.created_at)}</div>
                            <div class="record-source">${getSourceText(record.source)}</div>
                        </div>
                        
                        <div class="record-preview">
                            ${getRecordPreview(record)}
                        </div>
                        
                        <div class="card-footer">
                            <button class="view-details-btn" onclick="event.stopPropagation(); viewDetails('${record.id}')">
                                查看详情
                            </button>
                            <div class="file-count">${getFileCount(record)} 个文件</div>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            recordsSection.innerHTML = html;
        }
        
        function getStatusText(status) {
            const statusMap = {
                'processing': '处理中',
                'completed': '已完成',
                'failed': '失败'
            };
            return statusMap[status] || status;
        }
        
        function getSourceText(source) {
            const sourceMap = {
                'database': '数据库',
                'volume': 'Volume'
            };
            return sourceMap[source] || '未知';
        }
        
        function getRecordTitle(record) {
            // 尝试从URL中提取有意义的信息
            if (record.url.includes('douyin.com')) {
                return '抖音视频';
            }
            return record.url.length > 50 ? record.url.substring(0, 50) + '...' : record.url;
        }
        
        function getRecordPreview(record) {
            let preview = '';
            
            if (record.status === 'processing') {
                preview = `
                    <div class="preview-section">
                        <div class="preview-title">⏳ 处理状态</div>
                        <div class="preview-text">正在处理视频，请稍候...</div>
                    </div>
                `;
            } else if (record.status === 'failed') {
                preview = `
                    <div class="preview-section">
                        <div class="preview-title">❌ 处理失败</div>
                        <div class="preview-text">视频处理失败，请检查链接是否正确</div>
                    </div>
                `;
            } else {
                // AI总结预览
                if (record.summary) {
                    preview += `
                        <div class="preview-section">
                            <div class="preview-title">🤖 AI总结</div>
                            <div class="preview-summary">${record.summary.substring(0, 100)}${record.summary.length > 100 ? '...' : ''}</div>
                        </div>
                    `;
                }
                
                // 转录文本预览
                if (record.transcription) {
                    preview += `
                        <div class="preview-section">
                            <div class="preview-title">📝 语音转文字</div>
                            <div class="preview-text">${record.transcription.substring(0, 150)}${record.transcription.length > 150 ? '...' : ''}</div>
                        </div>
                    `;
                }
            }
            
            return preview;
        }
        
        function getFileCount(record) {
            let count = 0;
            if (record.video_path) count++;
            if (record.audio_path) count++;
            if (record.transcription_file) count++;
            if (record.summary_file) count++;
            return count;
        }
        
        function viewDetails(recordId) {
            window.location.href = `/detail/${encodeURIComponent(recordId)}`;
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN');
        }
        
        
        function showError(message) {
            const recordsSection = document.getElementById('recordsSection');
            recordsSection.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">❌</div>
                    <h3>加载失败</h3>
                    <p>${message}</p>
                </div>
            `;
        }
        
        // 页面加载时获取记录
        window.addEventListener('load', loadRecords);
        
        // Markdown渲染函数
        function renderMarkdown(text) {
            if (!text) return '';
            
            // 配置marked选项
            marked.setOptions({
                breaks: true,  // 支持换行
                gfm: true,     // 支持GitHub风格的Markdown
                sanitize: false, // 允许HTML标签
                smartLists: true,
                smartypants: true
            });
            
            try {
                return marked.parse(text);
            } catch (error) {
                console.error('Markdown渲染错误:', error);
                // 如果Markdown渲染失败，回退到简单的换行处理
                return text.replace(/\n/g, '<br>');
            }
        }
    </script>
</body>
</html>
