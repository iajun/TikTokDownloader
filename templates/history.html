<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史记录 - 抖音视频AI总结工具</title>
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .main-content {
            padding: 40px;
        }
        
        .nav-links {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .nav-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            margin: 0 15px;
            padding: 10px 20px;
            border-radius: 25px;
            transition: background 0.3s;
        }
        
        .nav-link:hover {
            background: #f8f9fa;
        }
        
        .nav-link.active {
            background: #667eea;
            color: white;
        }
        
        .records-section {
            margin-top: 30px;
        }
        
        .record-card {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .record-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        
        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .record-url {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            flex: 1;
            margin-right: 20px;
            word-break: break-all;
        }
        
        .record-url:hover {
            text-decoration: underline;
        }
        
        .record-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .status-processing {
            background: #e3f2fd;
            color: #1976d2;
        }
        
        .status-completed {
            background: #e8f5e8;
            color: #388e3c;
        }
        
        .status-failed {
            background: #ffebee;
            color: #d32f2f;
        }
        
        .record-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 14px;
            color: #666;
        }
        
        .record-date {
            display: flex;
            align-items: center;
        }
        
        .record-date::before {
            content: '📅';
            margin-right: 5px;
        }
        
        .record-id {
            font-family: monospace;
            background: #f8f9fa;
            padding: 2px 8px;
            border-radius: 4px;
        }
        
        .record-content {
            margin-top: 15px;
        }
        
        .content-section {
            margin-bottom: 15px;
        }
        
        .content-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        
        .content-title::before {
            content: '';
            width: 4px;
            height: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin-right: 8px;
            border-radius: 2px;
        }
        
        .content-text {
            color: #555;
            line-height: 1.6;
            max-height: 100px;
            overflow: hidden;
            position: relative;
        }
        
        .content-text.expanded {
            max-height: none;
        }
        
        /* 富文本样式 */
        .rich-text-content {
            line-height: 1.6;
            color: #555;
        }
        
        .rich-text-content h1,
        .rich-text-content h2,
        .rich-text-content h3,
        .rich-text-content h4,
        .rich-text-content h5,
        .rich-text-content h6 {
            color: #333;
            margin: 20px 0 10px 0;
            font-weight: 600;
        }
        
        .rich-text-content h1 {
            font-size: 1.5em;
            border-bottom: 2px solid #667eea;
            padding-bottom: 5px;
        }
        
        .rich-text-content h2 {
            font-size: 1.3em;
            border-bottom: 1px solid #e9ecef;
            padding-bottom: 3px;
        }
        
        .rich-text-content h3 {
            font-size: 1.2em;
        }
        
        .rich-text-content ul,
        .rich-text-content ol {
            margin: 10px 0;
            padding-left: 20px;
        }
        
        .rich-text-content li {
            margin: 5px 0;
        }
        
        .rich-text-content p {
            margin: 10px 0;
        }
        
        .rich-text-content strong {
            color: #333;
            font-weight: 600;
        }
        
        .rich-text-content em {
            color: #666;
            font-style: italic;
        }
        
        .rich-text-content code {
            background: #f8f9fa;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: #e74c3c;
        }
        
        .rich-text-content pre {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 15px 0;
            border-left: 4px solid #667eea;
        }
        
        .rich-text-content pre code {
            background: none;
            padding: 0;
            color: #333;
        }
        
        .rich-text-content blockquote {
            border-left: 4px solid #667eea;
            margin: 15px 0;
            padding: 10px 15px;
            background: #f8f9fa;
            border-radius: 0 8px 8px 0;
        }
        
        .rich-text-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        
        .rich-text-content th,
        .rich-text-content td {
            border: 1px solid #e9ecef;
            padding: 8px 12px;
            text-align: left;
        }
        
        .rich-text-content th {
            background: #f8f9fa;
            font-weight: 600;
        }
        
        .rich-text-content hr {
            border: none;
            height: 1px;
            background: #e9ecef;
            margin: 20px 0;
        }
        
        .expand-btn {
            background: none;
            border: none;
            color: #667eea;
            cursor: pointer;
            font-size: 12px;
            margin-top: 5px;
        }
        
        .expand-btn:hover {
            text-decoration: underline;
        }
        
        .file-links {
            margin-top: 15px;
        }
        
        .file-link {
            display: inline-block;
            background: #f8f9fa;
            color: #667eea;
            text-decoration: none;
            padding: 6px 12px;
            border-radius: 15px;
            margin-right: 8px;
            margin-bottom: 8px;
            font-size: 12px;
            transition: background 0.3s;
        }
        
        .file-link:hover {
            background: #e9ecef;
        }
        
        .video-player {
            width: 100%;
            max-width: 300px;
            border-radius: 8px;
            margin-top: 10px;
        }
        
        .audio-player {
            width: 100%;
            max-width: 250px;
            margin-top: 10px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        .empty-state h3 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .main-content {
                padding: 20px;
            }
            
            .record-header {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .record-url {
                margin-right: 0;
                margin-bottom: 10px;
            }
            
            .record-meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 历史记录</h1>
            <p>查看所有已处理的抖音视频</p>
        </div>
        
        <div class="main-content">
            <div class="nav-links">
                <a href="/" class="nav-link">🏠 返回首页</a>
                <a href="/history" class="nav-link active">📚 历史记录</a>
                <a href="/docs" class="nav-link">📖 API文档</a>
            </div>
            
            <div class="records-section" id="recordsSection">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <div>正在加载历史记录...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function loadRecords() {
            try {
                const response = await fetch('/api/records');
                const result = await response.json();
                
                if (result.success) {
                    displayRecords(result.records);
                } else {
                    showError('加载记录失败');
                }
            } catch (error) {
                console.error('Error loading records:', error);
                showError('网络错误，请重试');
            }
        }
        
        function displayRecords(records) {
            const recordsSection = document.getElementById('recordsSection');
            
            if (records.length === 0) {
                recordsSection.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <h3>暂无历史记录</h3>
                        <p>还没有处理过任何视频，<a href="/" style="color: #667eea;">去处理第一个视频</a></p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            
            records.forEach(record => {
                html += `
                    <div class="record-card">
                        <div class="record-header">
                            <a href="${record.url}" target="_blank" class="record-url">${record.url}</a>
                            <span class="record-status status-${record.status}">
                                ${getStatusText(record.status)}
                            </span>
                        </div>
                        
                        <div class="record-meta">
                            <div class="record-date">${formatDate(record.created_at)}</div>
                            <div class="record-id">${record.id}</div>
                        </div>
                        
                        ${getRecordContent(record)}
                    </div>
                `;
            });
            
            recordsSection.innerHTML = html;
            
            // 添加展开/收起功能
            addExpandFunctionality();
        }
        
        function getStatusText(status) {
            const statusMap = {
                'processing': '处理中',
                'completed': '已完成',
                'failed': '失败'
            };
            return statusMap[status] || status;
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN');
        }
        
        function getRecordContent(record) {
            if (record.status === 'processing') {
                return `
                    <div class="record-content">
                        <div class="content-section">
                            <div class="content-title">⏳ 处理状态</div>
                            <div class="content-text">正在处理视频，请稍候...</div>
                        </div>
                    </div>
                `;
            }
            
            if (record.status === 'failed') {
                return `
                    <div class="record-content">
                        <div class="content-section">
                            <div class="content-title">❌ 处理失败</div>
                            <div class="content-text">视频处理失败，请检查链接是否正确</div>
                        </div>
                    </div>
                `;
            }
            
            let html = '<div class="record-content">';
            
            // 视频
            if (record.video_path) {
                const fileName = record.video_path.split('/').pop();
                const videoUrl = `/downloads/Download/${fileName}`;
                html += `
                    <div class="content-section">
                        <div class="content-title">🎥 视频</div>
                        <video controls class="video-player">
                            <source src="${videoUrl}" type="video/mp4">
                            您的浏览器不支持视频播放。
                        </video>
                    </div>
                `;
            }
            
            // 音频
            if (record.audio_path) {
                const fileName = record.audio_path.split('/').pop();
                const audioUrl = `/downloads/Download/${fileName}`;
                html += `
                    <div class="content-section">
                        <div class="content-title">🎵 音频</div>
                        <audio controls class="audio-player">
                            <source src="${audioUrl}" type="audio/wav">
                            您的浏览器不支持音频播放。
                        </audio>
                    </div>
                `;
            }
            
            // 转录文本
            if (record.transcription) {
                html += `
                    <div class="content-section">
                        <div class="content-title">📝 语音转文字</div>
                        <div class="content-text" data-expandable="true">
                            ${record.transcription}
                        </div>
                    </div>
                `;
            }
            
            // AI总结
            if (record.summary) {
                html += `
                    <div class="content-section">
                        <div class="content-title">🤖 AI总结</div>
                        <div class="rich-text-content">${renderMarkdown(record.summary)}</div>
                    </div>
                `;
            }
            
            // 文件链接
            html += `
                <div class="content-section">
                    <div class="content-title">📁 文件下载</div>
                    <div class="file-links">
            `;
            
            if (record.video_path) {
                const fileName = record.video_path.split('/').pop();
                const videoUrl = `/downloads/Download/${fileName}`;
                html += `<a href="${videoUrl}" class="file-link" download>📹 视频</a>`;
            }
            
            if (record.audio_path) {
                const fileName = record.audio_path.split('/').pop();
                const audioUrl = `/downloads/Download/${fileName}`;
                html += `<a href="${audioUrl}" class="file-link" download>🎵 音频</a>`;
            }
            
            if (record.transcription_file) {
                const fileName = record.transcription_file.split('/').pop();
                const transcriptionUrl = `/downloads/Download/${fileName}`;
                html += `<a href="${transcriptionUrl}" class="file-link" download>📄 转录</a>`;
            }
            
            if (record.summary_file) {
                const fileName = record.summary_file.split('/').pop();
                const summaryUrl = `/downloads/Download/${fileName}`;
                html += `<a href="${summaryUrl}" class="file-link" download>📋 总结</a>`;
            }
            
            html += `
                    </div>
                </div>
            `;
            
            html += '</div>';
            return html;
        }
        
        function addExpandFunctionality() {
            const expandableTexts = document.querySelectorAll('.content-text[data-expandable="true"]');
            
            expandableTexts.forEach(textElement => {
                const text = textElement.innerHTML;
                const words = text.split(' ');
                
                if (words.length > 50) { // 如果文本超过50个词，添加展开功能
                    const shortText = words.slice(0, 50).join(' ') + '...';
                    textElement.innerHTML = shortText;
                    
                    const expandBtn = document.createElement('button');
                    expandBtn.className = 'expand-btn';
                    expandBtn.textContent = '展开';
                    expandBtn.onclick = () => {
                        if (textElement.classList.contains('expanded')) {
                            textElement.innerHTML = shortText;
                            expandBtn.textContent = '展开';
                            textElement.classList.remove('expanded');
                        } else {
                            textElement.innerHTML = text;
                            expandBtn.textContent = '收起';
                            textElement.classList.add('expanded');
                        }
                    };
                    
                    textElement.parentNode.appendChild(expandBtn);
                }
            });
        }
        
        function showError(message) {
            const recordsSection = document.getElementById('recordsSection');
            recordsSection.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">❌</div>
                    <h3>加载失败</h3>
                    <p>${message}</p>
                </div>
            `;
        }
        
        // 页面加载时获取记录
        window.addEventListener('load', loadRecords);
        
        // Markdown渲染函数
        function renderMarkdown(text) {
            if (!text) return '';
            
            // 配置marked选项
            marked.setOptions({
                breaks: true,  // 支持换行
                gfm: true,     // 支持GitHub风格的Markdown
                sanitize: false, // 允许HTML标签
                smartLists: true,
                smartypants: true
            });
            
            try {
                return marked.parse(text);
            } catch (error) {
                console.error('Markdown渲染错误:', error);
                // 如果Markdown渲染失败，回退到简单的换行处理
                return text.replace(/\n/g, '<br>');
            }
        }
    </script>
</body>
</html>
